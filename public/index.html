<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaio — Especialista Jobs Grill</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--fire:#FF4500;--ember:#FF8C00;--gold:#FFB800;--smoke:#111;--ash:#1A1A1A;--card:#222;--border:#2E2E2E;--light:#F0EBE3;--muted:#888;--white:#FFF}
body{background:var(--smoke);color:var(--light);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;overflow:hidden}
body::before{content:'';position:fixed;top:-30%;left:50%;transform:translateX(-50%);width:800px;height:600px;background:radial-gradient(ellipse,rgba(255,69,0,0.08) 0%,transparent 70%);pointer-events:none;z-index:0}
.brand-header{text-align:center;margin-bottom:1rem;z-index:1}
.brand-header h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.12em;background:linear-gradient(90deg,var(--fire),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-header p{font-size:.72rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.chat-container{position:relative;z-index:1;width:100%;max-width:480px;display:flex;flex-direction:column;height:88vh;max-height:820px}
.chat-header{background:var(--ash);border:1px solid var(--border);border-bottom:none;border-radius:20px 20px 0 0;padding:1.2rem 1.4rem;display:flex;align-items:center;gap:1rem;position:relative;overflow:hidden}
.chat-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--fire),var(--gold),var(--fire));background-size:200% 100%;animation:shimmer 3s ease-in-out infinite}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.agent-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--fire),var(--gold));display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;position:relative}
.agent-avatar::after{content:'';position:absolute;bottom:1px;right:1px;width:12px;height:12px;background:#00D46A;border-radius:50%;border:2px solid var(--ash)}
.agent-info h2{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:.05em;color:var(--white);line-height:1}
.agent-info .status{display:inline-flex;align-items:center;gap:4px;color:#00D46A;font-size:.7rem;font-weight:500}
.agent-info .status::before{content:'●';font-size:.6rem;animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.agent-info p{font-size:.7rem;color:var(--muted);margin-top:3px}
.header-badge{margin-left:auto;background:rgba(255,69,0,.15);border:1px solid rgba(255,69,0,.3);border-radius:8px;padding:4px 10px;font-size:.65rem;color:var(--ember);font-weight:600;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
.chat-messages{flex:1;overflow-y:auto;padding:1.2rem;display:flex;flex-direction:column;gap:.8rem;background:var(--smoke);border:1px solid var(--border);border-top:none;border-bottom:none;scroll-behavior:smooth}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg{display:flex;gap:8px;animation:fadeSlide .3s ease forwards;opacity:0}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;align-self:flex-end}
.msg.agent .msg-avatar{background:linear-gradient(135deg,var(--fire),var(--gold))}
.msg.user .msg-avatar{background:var(--card);border:1px solid var(--border)}
.msg-bubble{max-width:80%;padding:.75rem 1rem;border-radius:16px;font-size:.88rem;line-height:1.55}
.msg.agent .msg-bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--light)}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--fire),var(--ember));border-bottom-right-radius:4px;color:var(--white)}
.msg-bubble strong{color:var(--gold);font-weight:600}
.typing-indicator{display:flex;gap:8px;align-items:flex-end}
.typing-bubble{background:var(--card);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;padding:.75rem 1rem;display:flex;align-items:center;gap:5px}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-6px);opacity:1}}
.quick-questions{padding:.7rem 1.2rem;background:var(--ash);border:1px solid var(--border);border-top:none;border-bottom:none;display:flex;gap:6px;overflow-x:auto;flex-shrink:0}
.quick-questions::-webkit-scrollbar{display:none}
.quick-btn{flex-shrink:0;padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:.72rem;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:all .2s}
.quick-btn:hover{border-color:var(--fire);color:var(--ember);background:rgba(255,69,0,.06)}
.chat-input-area{background:var(--ash);border:1px solid var(--border);border-radius:0 0 20px 20px;padding:1rem 1.2rem;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.chat-input{flex:1;background:var(--smoke);border:1px solid var(--border);border-radius:12px;padding:.65rem .9rem;color:var(--light);font-size:.88rem;font-family:'DM Sans',sans-serif;resize:none;outline:none;line-height:1.45;max-height:100px;overflow-y:auto;transition:border-color .2s}
.chat-input::placeholder{color:var(--muted)}
.chat-input:focus{border-color:rgba(255,69,0,.4)}
.send-btn{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--fire),var(--ember));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;color:white}
.send-btn:hover{transform:scale(1.05);opacity:.9}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.footer-note{text-align:center;font-size:.62rem;color:var(--border);margin-top:.6rem;letter-spacing:.03em;z-index:1}
@media(max-width:500px){body{padding:0;align-items:stretch;justify-content:flex-start}.chat-container{max-width:100%;height:100vh;max-height:100vh}.chat-header{border-radius:0}.chat-input-area{border-radius:0}.brand-header{display:none}}
</style>
</head>
<body>
<div class="brand-header">
  <h1>JOBS GRILL</h1>
  <p>Kaio • Churrasqueiro & Especialista</p>
</div>
<div class="chat-container">
  <div class="chat-header">
    <div class="agent-avatar">🔥</div>
    <div class="agent-info">
      <h2>Kaio — Jobs Grill</h2>
      <span class="status">Online agora</span>
      <p>Churrasqueiro & Especialista Jobs Grill</p>
    </div>
    <div class="header-badge">⭐ Especialista</div>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="quick-questions">
    <button class="quick-btn" onclick="sendQuick('Faz fumaça?')">🚫 Faz fumaça?</button>
    <button class="quick-btn" onclick="sendQuick('Funciona em qualquer fogão?')">🍳 Qual fogão?</button>
    <button class="quick-btn" onclick="sendQuick('Qual carne fica melhor na Jobs Grill?')">🥩 Qual carne?</button>
    <button class="quick-btn" onclick="sendQuick('Como funciona o módulo espeto?')">🍢 Módulo Espeto</button>
    <button class="quick-btn" onclick="sendQuick('Posso usar em apartamento?')">🏢 Apartamento</button>
    <button class="quick-btn" onclick="sendQuick('Qual o preço e os modelos disponíveis?')">💰 Preços</button>
    <button class="quick-btn" onclick="sendQuick('É difícil de limpar?')">🧼 Limpeza</button>
    <button class="quick-btn" onclick="sendQuick('Qual a diferença da grelha para a chapa?')">🔄 Grelha vs Chapa</button>
  </div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="userInput" placeholder="Pergunta pro Kaio sobre churrasco ou a Jobs Grill…" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
</div>
<div class="footer-note">Kaio · Especialista Jobs Grill · Powered by Claude</div>
<script>
const conversationHistory=[];let isTyping=false;
window.addEventListener('DOMContentLoaded',()=>{
  addMessage('agent','Eaí! Tudo certo? 🔥\n\nSou o Kaio — churrasqueiro e especialista da Jobs Grill.\n\nCola aqui com sua dúvida: sobre a churrasqueira, os módulos, qual carne fica melhor, como usar…\n\n**O que você quer saber?**');
  const input=document.getElementById('userInput');
  input.addEventListener('keydown',(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});
  input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,100)+'px'});
});
function addMessage(role,text){
  const messages=document.getElementById('chatMessages');
  const wrapper=document.createElement('div');wrapper.className=`msg ${role}`;
  const avatar=document.createElement('div');avatar.className='msg-avatar';avatar.textContent=role==='agent'?'🔥':'👤';
  const bubble=document.createElement('div');bubble.className='msg-bubble';bubble.innerHTML=formatMessage(text);
  wrapper.appendChild(avatar);wrapper.appendChild(bubble);messages.appendChild(wrapper);
  messages.scrollTop=messages.scrollHeight;
}
function formatMessage(text){return text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}
function showTyping(){
  const messages=document.getElementById('chatMessages');
  const wrapper=document.createElement('div');wrapper.className='msg agent typing-indicator';wrapper.id='typingIndicator';
  const avatar=document.createElement('div');avatar.className='msg-avatar';avatar.textContent='🔥';
  const bubble=document.createElement('div');bubble.className='typing-bubble';bubble.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  wrapper.appendChild(avatar);wrapper.appendChild(bubble);messages.appendChild(wrapper);messages.scrollTop=messages.scrollHeight;
}
function hideTyping(){const el=document.getElementById('typingIndicator');if(el)el.remove()}
async function sendMessage(){
  const input=document.getElementById('userInput');const sendBtn=document.getElementById('sendBtn');
  const text=input.value.trim();if(!text||isTyping)return;
  input.value='';input.style.height='auto';
  addMessage('user',text);conversationHistory.push({role:'user',content:text});
  isTyping=true;sendBtn.disabled=true;showTyping();
  try{
    const response=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:conversationHistory})});
    const data=await response.json();
    const reply=data.reply||'Eita, travei aqui 😅 Manda de novo!';
    hideTyping();addMessage('agent',reply);conversationHistory.push({role:'assistant',content:reply});
  }catch(err){hideTyping();addMessage('agent','Eita, travei aqui 😅 Tenta de novo!');console.error(err)}
  isTyping=false;sendBtn.disabled=false;input.focus();
}
function sendQuick(text){const input=document.getElementById('userInput');input.value=text;sendMessage()}
</script>
</body>
</html>
