<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaio — Jobs Grill</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
,::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--fire:#FF4500;--ember:#FF8C00;--gold:#FFB800;--smoke:#0E0E0E;--ash:#181818;--card:#202020;--border:#2A2A2A;--light:#F0EBE3;--muted:#666;--white:#FFF}
html{scroll-behavior:smooth}
body{background:var(--smoke);color:var(--light);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;overflow:hidden;position:relative}
body::before{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:900px;height:700px;background:radial-gradient(ellipse,rgba(255,69,0,0.06) 0%,transparent 65%);pointer-events:none;z-index:0}
.brand-header{text-align:center;margin-bottom:.8rem;z-index:1}
.brand-header h1{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.15em;background:linear-gradient(90deg,var(--fire),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-header p{font-size:.7rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
.chat-container{position:relative;z-index:1;width:100%;max-width:480px;display:flex;flex-direction:column;height:90vh;max-height:840px;border-radius:24px;overflow:hidden;box-shadow:0 0 60px rgba(255,69,0,0.08),0 0 0 1px var(--border)}
.chat-header{background:var(--ash);padding:1.1rem 1.3rem;display:flex;align-items:center;gap:.9rem;position:relative;overflow:hidden;flex-shrink:0}
.chat-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--fire),var(--gold),var(--ember),var(--fire));background-size:300% 100%;animation:fire-line 4s ease-in-out infinite}
@keyframes fire-line{0%,100%{background-position:0%}50%{background-position:100%}}
.agent-avatar{width:46px;height:46px;border-radius:50%;flex-shrink:0;position:relative;background:linear-gradient(135deg,var(--fire),var(--gold));display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.agent-avatar::after{content:'';position:absolute;bottom:0;right:0;width:12px;height:12px;background:#00D46A;border-radius:50%;border:2px solid var(--ash)}
.agent-info h2{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.06em;color:var(--white);line-height:1}
.status{display:inline-flex;align-items:center;gap:4px;color:#00D46A;font-size:.68rem;font-weight:500;margin-top:2px}
.status::before{content:'●';font-size:.55rem;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.agent-sub{font-size:.68rem;color:var(--muted);margin-top:1px}
.promo-badge{margin-left:auto;background:linear-gradient(135deg,rgba(255,69,0,.2),rgba(255,184,0,.1));border:1px solid rgba(255,184,0,.3);border-radius:8px;padding:4px 10px;font-size:.6rem;color:var(--gold);font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;text-align:center;line-height:1.4}
.chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.7rem;background:var(--smoke)}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.msg{display:flex;gap:7px;animation:pop .25s ease forwards;opacity:0}
@keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;align-self:flex-end;display:flex;align-items:center;justify-content:center;font-size:.85rem}
.msg.agent .msg-av{background:linear-gradient(135deg,var(--fire),var(--gold))}
.msg.user .msg-av{background:var(--card);border:1px solid var(--border)}
.msg-bubble{max-width:82%;padding:.7rem .95rem;border-radius:16px;font-size:.85rem;line-height:1.55}
.msg.agent .msg-bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--light)}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--fire),var(--ember));border-bottom-right-radius:4px;color:var(--white)}
.msg-bubble strong{color:var(--gold);font-weight:600}
.typing-wrap{display:flex;gap:7px;align-items:flex-end;animation:pop .25s ease forwards;opacity:0}
.typing-bubble{background:var(--card);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;padding:.7rem .95rem;display:flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
.quick-wrap{padding:.6rem 1rem;background:var(--ash);display:flex;gap:5px;overflow-x:auto;flex-shrink:0;border-top:1px solid var(--border)}
.quick-wrap::-webkit-scrollbar{display:none}
.qbtn{flex-shrink:0;padding:5px 11px;background:transparent;border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:.7rem;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:all .2s}
.qbtn:hover{border-color:var(--fire);color:var(--ember);background:rgba(255,69,0,.05)}
.input-area{background:var(--ash);padding:.9rem 1rem;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;border-top:1px solid var(--border)}
.chat-input{flex:1;background:var(--smoke);border:1px solid var(--border);border-radius:12px;padding:.6rem .85rem;color:var(--light);font-size:.86rem;font-family:'DM Sans',sans-serif;resize:none;outline:none;line-height:1.45;max-height:90px;overflow-y:auto;transition:border-color .2s}
.chat-input::placeholder{color:var(--muted)}
.chat-input:focus{border-color:rgba(255,69,0,.4)}
.send-btn{width:40px;height:40px;border-radius:11px;flex-shrink:0;background:linear-gradient(135deg,var(--fire),var(--ember));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;transition:all .2s}
.send-btn:hover{transform:scale(1.06);opacity:.9}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.footer-note{font-size:.6rem;color:var(--border);text-align:center;margin-top:.5rem;z-index:1;letter-spacing:.03em}
@media(max-width:500px){body{padding:0;align-items:stretch;justify-content:flex-start}.chat-container{max-width:100%;height:100vh;max-height:100vh;border-radius:0}.brand-header{display:none}}
</style>
</head>
<body>
<div class="brand-header">
  <h1>JOBS GRILL</h1>
  <p>Kaio • Churrasqueiro & Vendedor Especialista</p>
</div>
<div class="chat-container">
  <div class="chat-header">
    <div class="agent-avatar">🔥</div>
    <div class="agent-info">
      <h2>Kaio — Jobs Grill</h2>
      <div class="status">Online agora</div>
      <div class="agent-sub">Churrasqueiro & Especialista</div>
    </div>
    <div class="promo-badge">🔥 ATÉ<br>47% OFF</div>
  </div>
  <div class="chat-messages" id="msgs"></div>
  <div class="quick-wrap">
    <button class="qbtn" onclick="sq('Qual a diferença da Premium pra Light?')">🔥 Premium vs Light</button>
    <button class="qbtn" onclick="sq('Faz fumaça?')">🚫 Fumaça?</button>
    <button class="qbtn" onclick="sq('Posso usar em apartamento?')">🏢 Apartamento</button>
    <button class="qbtn" onclick="sq('Quero ver os preços e combos')">💰 Preços</button>
    <button class="qbtn" onclick="sq('Como funciona o módulo espeto?')">🍢 Espeto</button>
    <button class="qbtn" onclick="sq('Qual carne fica melhor?')">🥩 Carnes</button>
    <button class="qbtn" onclick="sq('Tem algum combo em promoção?')">🎁 Combos</button>
    <button class="qbtn" onclick="sq('É difícil de limpar?')">🧼 Limpeza</button>
  </div>
  <div class="input-area">
    <textarea class="chat-input" id="inp" placeholder="Fala com o Kaio… 🔥" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>
<div class="footer-note">Kaio · Jobs Grill · Powered by Claude</div>
<script>
const history=[];let busy=false;
window.addEventListener('DOMContentLoaded',()=>{
  addMsg('agent','Eaí! Bom te ver por aqui 🔥\n\nSou o Kaio — churrasqueiro e especialista da Jobs Grill.\n\nA gente tem *churrasqueiras de fogão* que você usa em apartamento, sem carvão, sem fumaça. E tá com desconto de até *47% OFF* agora.\n\nMe conta: você mora em casa ou apartamento?');
  const i=document.getElementById('inp');
  i.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
  i.addEventListener('input',()=>{i.style.height='auto';i.style.height=Math.min(i.scrollHeight,90)+'px'});
});
function addMsg(role,text){
  const msgs=document.getElementById('msgs');
  const w=document.createElement('div');w.className=msg ${role};
  const av=document.createElement('div');av.className='msg-av';av.textContent=role==='agent'?'🔥':'👤';
  const b=document.createElement('div');b.className='msg-bubble';
  b.innerHTML=fmt(text);
  w.appendChild(av);w.appendChild(b);msgs.appendChild(w);
  msgs.scrollTop=msgs.scrollHeight;
}
function fmt(t){return t.replace(/\\(.?)\\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}
function showTyping(){
  const msgs=document.getElementById('msgs');
  const w=document.createElement('div');w.className='typing-wrap';w.id='typing';
  const av=document.createElement('div');av.className='msg-av';av.style.background='linear-gradient(135deg,#FF4500,#FFB800)';av.textContent='🔥';
  const b=document.createElement('div');b.className='typing-bubble';
  b.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  w.appendChild(av);w.appendChild(b);msgs.appendChild(w);
  msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){const e=document.getElementById('typing');if(e)e.remove()}
async function send(){
  const inp=document.getElementById('inp');
  const btn=document.getElementById('sendBtn');
  const txt=inp.value.trim();
  if(!txt||busy)return;
  inp.value='';inp.style.height='auto';
  addMsg('user',txt);history.push({role:'user',content:txt});
  busy=true;btn.disabled=true;showTyping();
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history})});
    const d=await r.json();
    const reply=d.reply||'Eita, travei 😅 Manda de novo!';
    hideTyping();addMsg('agent',reply);
    history.push({role:'assistant',content:reply});
  }catch(e){hideTyping();addMsg('agent','Travei aqui 😅 Tenta de novo!')}
  busy=false;btn.disabled=false;inp.focus();
}
function sq(t){document.getElementById('inp').value=t;send()}
</script>
</body>
</html>
